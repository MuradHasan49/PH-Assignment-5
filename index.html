<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">
    <!-- daisyUI and tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- styles -->
    <link rel="stylesheet" href="./styles/style.css">
    <title> GitHub Issues Tracker | Murad Hasan </title>

<body>
    <section class=" min-h-screen">
        <div id="login-section" class="card w-[380px] bg-base-100 shadow-xl mx-auto mt-4 p-8 border border-gray-100">
            <div class="flex flex-col items-center mb-6">
                <img src="./assets/github-logo.png" class="w-16 mb-4">
                <h1 class="text-2xl font-semibold text-center text-gray-800">GitHub Issues Tracker</h1>
                <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-control w-full mb-3">
                    <label class="label"><span class="label-text font-medium">Username</span></label>
                    <input id="user" type="text" value="admin" placeholder="admin"
                        class="input input-bordered w-full bg-white" required />
                </div>

                <div class="form-control w-full mb-6">
                    <label class="label"><span class="label-text font-medium">Password</span></label>
                    <input id="pass" type="password" value="admin123" placeholder="admin123"
                        class="input input-bordered w-full bg-white" required />
                </div>

                <button type="submit"
                    class="btn bg-indigo-600 hover:bg-indigo-700 text-white border-none w-full capitalize text-lg">
                    Sign In
                </button>
            </form>

            <div class="divider text-gray-400 text-xs my-6">OR</div>
            <div class="text-center p-4 bg-gray-50 rounded-lg text-sm">
                <p>Username: <span class="font-bold">admin</span></p>
                <p>Password: <span class="font-bold">admin123</span></p>
            </div>
        </div>

        <!-- load data sectiion -->
        <section class="">
            <div id="dashboard-section" class="hidden-section">
                <!-- <button onclick="logout()" class="btn btn-outline btn-error">Logout</button> -->

                <!-- navbar -->
                <div class="navbar bg-base-100 shadow-sm px-4">
                    <div class="flex-1">
                        <a class="flex items-center gap-2 font-bold text-lg">
                            <img width="35" src="./assets/github-logo.png" alt="">
                            <span class="hidden sm:inline">GitHub Issues Tracker</span>
                        </a>
                    </div>

                    <div class="flex-none gap-2">
                        <input type="text" placeholder="Search"
                            class="input input-sm md:input-md input-bordered w-54 sm:w-auto" />
                        <button class="btn btn-sm md:btn-md btn-primary">
                            <i class="fa-solid fa-plus"></i> <span class="hidden md:flex">New Issue</span>
                        </button>
                    </div>
                </div>

                <!-- toggle button -->
                <div class=" w-11/12 mx-auto my-10 shadow-lg space-x-2 p-8 text-center lg:text-start">
                    <button onclick="togglebtn(this)" class="btn btntoggle btn-primary ">All</button>
                    <button onclick="togglebtn(this)" class="btn btntoggle ">Open</button>
                    <button onclick="togglebtn(this)" class="btn btntoggle ">Closed</button>
                </div>

                <!-- statusbar -->
                <div class="w-11/12 mx-auto p-8 shadow-lg flex justify-between items-center">
                    <div class="flex flex-wrap items-center gap-2">
                        <img src="./assets/Aperture.png" alt="">
                        <div class="">
                            <h2 id="status" class="text-2xl font-semibold"> </h2>
                            <p class="text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="space-x-5 flex flex-wrap">
                        <span> <i class="fa-solid fa-circle text-green-600"></i> Open</span>
                        <span> <i class="fa-solid fa-circle text-red-600"></i> Closed</span>
                    </div>
                </div>
                <!-- card -->
                <div id="displayContainer"
                    class=" w-11/12 mx-auto grid grid-cols-1 items-center md:grid-cols-3 lg:grid-cols-4 gap-4 my-6  card-dsiplay">
                </div>
                <!-- open card -->
                <div id="openCard"
                    class="w-11/12 mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 my-6  card-dsiplay hidden ">

                </div>

                <!-- closed Card card -->
                <div id="closedCard"
                    class="w-11/12 mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 my-6 card-dsiplay hidden">

                </div>

                <!-- modal section -->
                <div class="">
                    <dialog id="my_modal_1" class="modal">
                        <div class="modal-box">
                            <div class="" id="modalContainer">
                                
                            </div>

                            <div class="modal-action">
                                <form method="dialog">
                                    <button class="btn btn-primary">Close</button>
                                </form>
                            </div>
                        </div>
                    </dialog>
                </div>

            </div>
        </section>
    </section>

    <script src="./sctipts/script.js"></script>
</body>

</html>
